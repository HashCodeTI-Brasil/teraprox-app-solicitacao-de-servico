name: Deploy Solicitacao De Servico to Firebase Hosting
on:
  push:
    branches: ["master", "gcp-migration"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: teraprox-SGM-SS

      - uses: actions/checkout@v4
        with:
          repository: HashCodeTI-Brasil/teraprox-core
          token: ${{ secrets.CORE_REPO_PAT }}
          path: teraprox-core
          ref: gcp-migration

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: teraprox-SGM-SS/package-lock.json

      # Install root teraprox-core deps — popula teraprox-core/node_modules
      # com qr-scanner, react-dom, file-saver, etc. que sao peerDeps de
      # ui-kit. O webpack do MF resolve via walk-up de ui-kit/dist.
      - name: Install root teraprox-core dependencies
        working-directory: teraprox-core
        run: npm ci --legacy-peer-deps 2>/dev/null || npm install --legacy-peer-deps

      - name: Build core packages
        working-directory: teraprox-core
        run: |
          # MF (CRA) precisa do .d.ts para type-check de imports tipo
          # \'import type *** DevRoute *** from "teraprox-core-sdk/dev"\'.
          # core-sdk/tsconfig agora tem lib ES2019 (flatMap).
          for pkg in core-sdk ui-kit ui-kit-core ui-kit-sgm ui-kit-sgp; do
            echo "::group::Building $pkg"
            pushd "packages/$pkg"
            npm ci --legacy-peer-deps 2>/dev/null || npm install --legacy-peer-deps
            npm run build
            popd
            echo "::endgroup::"
          done

      - name: Install MF dependencies
        working-directory: teraprox-SGM-SS
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build MF
        working-directory: teraprox-SGM-SS
        env:
          REACT_APP_FIREBASE_CONFIG: ${{ secrets.REACT_APP_FIREBASE_CONFIG }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: teraprox
          channelId: live
          target: teraprox-solicitacoes
          entryPoint: teraprox-SGM-SS
